name: build

# Builds llama-swap + llama.cpp (Intel SYCL) from source and pushes to GHCR.
#
#   - Weekly cron  -> rebuilds against the latest llama.cpp release.
#   - Manual run   -> lets you pin a specific llama.cpp ref / llama-swap version.
#   - Push to main -> rebuilds when the Dockerfile or this workflow change.
#
# Every trigger builds the standard image fleet (one image per oneAPI version):
#   - llama-swap-sycl       on oneAPI 2025.3.3 (upstream's last SYCL-validated)
#   - llama-swap-sycl-2026  on oneAPI 2026.0.0 (latest)
#
# A manual run with a custom image_name (e.g. llama-swap-sycl-next) bypasses the
# fleet and does a single one-off build using the oneapi_version input.

on:
  workflow_dispatch:
    inputs:
      llamacpp_ref:
        description: "llama.cpp git ref to build (tag like b9495, a commit sha, a branch, or 'latest' release)"
        default: "latest"
        required: false
      llama_swap_version:
        description: "llama-swap release to bundle ('latest' or a version like 222)"
        default: "latest"
        required: false
      sycl_f16:
        description: "Enable GGML_SYCL_F16 half-precision kernels"
        type: choice
        options: ["ON", "OFF"]
        default: "ON"
      oneapi_version:
        description: "oneAPI base image tag — ONLY used for a custom image_name one-off; the standard fleet pins its own per image"
        default: "2026.0.0-devel-ubuntu24.04"
        required: false
      image_name:
        description: "Set a non-default name (e.g. llama-swap-sycl-next) to do a single experimental build instead of the standard fleet"
        default: "llama-swap-sycl"
        required: false
  schedule:
    # Every 2 days at 06:00 UTC — track the latest llama.cpp release.
    - cron: "0 6 */2 * *"
  push:
    branches: [main]
    paths:
      - "Dockerfile"
      - "config.example.yaml"
      - ".github/workflows/build.yml"

jobs:
  # Decide what to build: the standard fleet, or a single custom experimental
  # image when a non-default image_name is passed to a manual run.
  setup:
    runs-on: ubuntu-latest
    outputs:
      builds: ${{ steps.set.outputs.builds }}
    steps:
      - name: Compute build matrix
        id: set
        run: |
          set -euo pipefail
          IMG="${{ github.event.inputs.image_name }}"
          ONEAPI="${{ github.event.inputs.oneapi_version }}"
          if [ -n "$IMG" ] && [ "$IMG" != "llama-swap-sycl" ]; then
            # One-off experimental build to a custom package.
            builds=$(jq -cn \
              --arg img "$IMG" \
              --arg oa "${ONEAPI:-2026.0.0-devel-ubuntu24.04}" \
              '[{image:$img, oneapi:$oa}]')
          else
            # Standard fleet: one image per oneAPI version, always built.
            builds='[
              {"image":"llama-swap-sycl","oneapi":"2025.3.3-0-devel-ubuntu24.04"},
              {"image":"llama-swap-sycl-2026","oneapi":"2026.0.0-devel-ubuntu24.04"}
            ]'
            builds=$(echo "$builds" | jq -c .)
          fi
          echo "builds=$builds" >> "$GITHUB_OUTPUT"
          echo "### Build fleet: $builds" >> "$GITHUB_STEP_SUMMARY"

  build:
    needs: setup
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      # Don't let one oneAPI version's failure cancel the other's build.
      fail-fast: false
      matrix:
        build: ${{ fromJSON(needs.setup.outputs.builds) }}
    # One in-flight build per (branch, image) — the images build independently.
    concurrency:
      group: build-${{ github.ref }}-${{ matrix.build.image }}
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # The oneAPI base image + a full SYCL compile need more than the
      # default runner disk; reclaim ~25-30 GB before building.
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          large-packages: false
          docker-images: false

      - name: Resolve versions
        id: ver
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          REF="${{ github.event.inputs.llamacpp_ref || 'latest' }}"
          if [ "$REF" = "latest" ] || [ -z "$REF" ]; then
            REF=$(gh api repos/ggml-org/llama.cpp/releases/latest --jq .tag_name)
          fi
          LS="${{ github.event.inputs.llama_swap_version || 'latest' }}"
          if [ "$LS" = "latest" ] || [ -z "$LS" ]; then
            LS=$(gh api repos/mostlygeek/llama-swap/releases/latest --jq .tag_name)
          fi
          LS="${LS#v}"
          ONEAPI="${{ matrix.build.oneapi }}"
          IMG="${{ matrix.build.image }}"
          echo "llamacpp_ref=$REF" >> "$GITHUB_OUTPUT"
          echo "ls_ver=$LS"        >> "$GITHUB_OUTPUT"
          echo "oneapi=$ONEAPI"    >> "$GITHUB_OUTPUT"
          echo "image=ghcr.io/${{ github.repository_owner }}/$IMG" >> "$GITHUB_OUTPUT"
          echo "build_date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "### Building \`$IMG\` — llama.cpp \`$REF\` + llama-swap \`$LS\` on oneAPI \`$ONEAPI\`" >> "$GITHUB_STEP_SUMMARY"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          provenance: false
          tags: |
            ${{ steps.ver.outputs.image }}:latest
            ${{ steps.ver.outputs.image }}:${{ steps.ver.outputs.llamacpp_ref }}
            ${{ steps.ver.outputs.image }}:${{ steps.ver.outputs.llamacpp_ref }}-ls${{ steps.ver.outputs.ls_ver }}
          build-args: |
            LLAMACPP_REF=${{ steps.ver.outputs.llamacpp_ref }}
            LS_VER=${{ steps.ver.outputs.ls_ver }}
            GGML_SYCL_F16=${{ github.event.inputs.sycl_f16 || 'ON' }}
            ONEAPI_VERSION=${{ steps.ver.outputs.oneapi }}
            BUILD_DATE=${{ steps.ver.outputs.build_date }}
          # Scope the GHA cache per image so the two oneAPI builds don't evict
          # each other's layers.
          cache-from: type=gha,scope=${{ matrix.build.image }}
          cache-to: type=gha,scope=${{ matrix.build.image }},mode=max
